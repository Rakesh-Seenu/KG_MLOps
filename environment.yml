name: biokg
channels:
  - rapidsai
  - conda-forge
  - nvidia
  - pytorch
  - defaults

dependencies:
  # Python
  - python=3.10
  - pip

  # NVIDIA RAPIDS (requires CUDA 11.8+)
  - rapids=24.04
  - cudatoolkit=11.8

  # Deep Learning
  - pytorch::pytorch=2.2.2
  - pytorch::torchvision
  - pytorch::torchaudio
  - pytorch::pytorch-cuda=11.8

  # Key pip packages
  - pip:
    - lightning==2.2.4
    - mlflow==2.12.2
    - transformers==4.40.2
    - huggingface-hub==0.23.1
    - datasets==2.19.1
    - fastapi==0.111.0
    - uvicorn==0.29.0
    - pydantic==2.7.1
    - gradio==4.29.0
    - numpy==1.26.4
    - pandas==2.2.2
    - scikit-learn==1.4.2
    - matplotlib==3.8.4
    - seaborn==0.13.2
    - tqdm==4.66.4
    - requests==2.31.0
    - python-dotenv==1.0.1
    - loguru==0.7.2
    - rich==13.7.1
